<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext y='65' x='20' font-family='serif' font-size='60' fill='white'%3EE%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ETHARA AI — INVENTORY & ORDER MANAGEMENT SYSTEM</title>
    <!-- Custom Cyberpunk/Monospace Fonts (Orbitron, Share Tech Mono, JetBrains Mono) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&family=Orbitron:wght@400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <!-- Tailwind Play CDN for layout grid and dynamic theme parsing -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: '#0a0a0f',
              foreground: '#e0e0e0',
              card: '#12121a',
              muted: '#1c1c2e',
              'muted-foreground': '#6b7280',
              accent: '#00ff88',
              'accent-secondary': '#ff00ff',
              'accent-tertiary': '#00d4ff',
              border: '#2a2a3a',
              input: '#12121a',
              destructive: '#ff3366',
            },
            fontFamily: {
              display: ['"Orbitron"', '"Share Tech Mono"', 'monospace'],
              body: ['"JetBrains Mono"', '"Fira Code"', 'monospace'],
              mono: ['"Share Tech Mono"', 'monospace'],
            },
            boxShadow: {
              neon: '0 0 5px #00ff88, 0 0 10px #00ff8840',
              'neon-sm': '0 0 3px #00ff88, 0 0 6px #00ff8830',
              'neon-lg': '0 0 10px #00ff88, 0 0 20px #00ff8860, 0 0 40px #00ff8830',
              'neon-secondary': '0 0 5px #ff00ff, 0 0 20px #ff00ff60',
              'neon-tertiary': '0 0 5px #00d4ff, 0 0 20px #00d4ff60',
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
